<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan SMAS YPPK Teruna Bakti</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --font-body: 'Poppins', sans-serif;
            --font-heading: 'Playfair Display', serif;
            --bg-body: #f8fafc;
            --box-blue-dark: #1e3a8a;
            --box-blue-light: #2563eb;
            --accent-gold: #fbbf24;
            --text-dark: #1e293b;
            --white: #ffffff;
            --success: #10b981;
            --danger: #ef4444;
        }

        body { 
            font-family: var(--font-body); 
            margin: 0; 
            background: var(--bg-body); 
            color: var(--text-dark); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px); 
            background-size: 20px 20px; 
            padding-bottom: 50px; 
            box-sizing: border-box; 
        }
        
        h1, h2 { font-family: var(--font-heading); }
        
        .header-section { text-align: center; margin-bottom: 30px; animation: fadeInDown 0.8s ease-out; padding: 0 15px; }
        
        /* Pengaturan Logo */
        #display-logo { margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1)); border-radius: 10px;}
        
        #display-school-name { font-size: 32px; color: var(--box-blue-dark); margin: 0; letter-spacing: 1px; font-weight: 700; }
        .sub-header { font-size: 16px; color: #64748b; font-weight: 500; margin-top: 5px; }

        .card { 
            background: linear-gradient(135deg, var(--box-blue-dark) 0%, var(--box-blue-light) 100%); 
            color: var(--white); 
            padding: 40px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 500px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(37, 99, 235, 0.2); 
            animation: scaleIn 0.6s ease-out; 
            position: relative; 
            overflow: hidden; 
        }

        .input-group { margin-bottom: 20px; position: relative; z-index: 2; }
        input[type="text"] { 
            width: 100%; padding: 16px; border: 2px solid rgba(255, 255, 255, 0.2); 
            border-radius: 12px; font-size: 16px; text-align: center; transition: 0.3s; 
            background: rgba(255, 255, 255, 0.95); color: var(--text-dark); font-family: inherit; box-sizing: border-box; 
        }
        input[type="text"]:focus { border-color: var(--accent-gold); outline: none; background: #ffffff; box-shadow: 0 0 0 4px rgba(251, 191, 36, 0.3); }

        .btn-check { 
            background: var(--accent-gold); color: var(--box-blue-dark); width: 100%; 
            padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; 
            cursor: pointer; transition: 0.3s; position: relative; z-index: 2; font-family: var(--font-body); 
        }
        .btn-check:hover { background: #f59e0b; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1); }
        .btn-outline { background: transparent; color: var(--white); border: 1px solid rgba(255, 255, 255, 0.4); margin-top: 15px; }
        .btn-outline:hover { background: rgba(255, 255, 255, 0.1); }

        .result-frame { background: rgba(255, 255, 255, 0.1); border: 1px dashed rgba(255, 255, 255, 0.4); border-radius: 16px; padding: 30px 20px; margin-top: 20px; position: relative; z-index: 2; }
        .status-badge { display: inline-block; margin: 15px 0; padding: 8px 30px; font-size: 20px; font-weight: 700; color: white; border-radius: 50px; letter-spacing: 1px; font-family: var(--font-body); }
        .status-lulus { background: var(--success); box-shadow: 0 8px 15px rgba(16, 185, 129, 0.4); }
        .status-gagal { background: var(--danger); box-shadow: 0 8px 15px rgba(239, 68, 68, 0.4); }

        .footer-credit { position: fixed; bottom: 20px; width: 100%; text-align: center; font-size: 14px; color: #64748b; font-weight: 600; letter-spacing: 1px; z-index: 10; font-family: var(--font-body); }

        #result-area { display: none; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

   <div class="header-section" id="head-ui">
        <img id="display-logo" src="logo.jpg.jpg" alt="Logo SMA YPPK Teruna Bakti" width="120">
        
        <h1 id="display-school-name">SMAS YPPK TERUNA BAKTI</h1>
        <div class="sub-header">Pengumuman Kelulusan Peserta Didik Kelas XII T.A 2025/2026</div>

    <div class="card" id="main-content">

            <button class="btn-check" onclick="prosesCek()">Cek Hasil Sekarang</button>
        </div>

                <div id="res-nisn" style="font-size: 13px; color: #e2e8f0; margin-bottom: 20px;">NISN: -</div>
                <div style="width: 50px; height: 1px; background: rgba(255,255,255,0.3); margin: 0 auto 15px;"></div>
                <div style="font-size: 12px; color: #bfdbfe; text-transform: uppercase; font-weight: 600;">Dinyatakan:</div>
                <div id="res-status" class="status-badge">-</div>
                <div id="res-msg" style="font-size: 14px; line-height: 1.6; margin-top: 10px;"></div>
            </div>
            <button class="btn-check btn-outline" onclick="location.reload()">Cek Siswa Lain</button>
        </div>
    </div>

        function prosesCek() {
            const input = document.getElementById('nisn-field').value.trim();
            if(!input) return alert("Masukkan Nomor Induk Siswa Nasional (NISN) Anda!");

            // Mencari siswa berdasarkan NISN
            const siswa = dataSiswa.find(s => s.NISN === input);
            
            if(!siswa) {
                return alert("Data dengan NISN " + input + " tidak ditemukan. Pastikan nomor Anda sudah benar.");
            }

            // Menyembunyikan form pencarian dan menampilkan hasil
            document.getElementById('search-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';

            const nama = siswa.Nama;
            const status = siswa.Keterangan.toUpperCase();

            document.getElementById('res-nama').innerText = nama;
            document.getElementById('res-nisn').innerText = "NISN: " + input;
            
            const badge = document.getElementById('res-status');
            badge.innerText = status;

            // Menentukan warna dan pesan berdasarkan status Lulus/Tidak Lulus
            if(status.includes("LULUS") && !status.includes("TIDAK")) {
                badge.className = "status-badge status-lulus";
                document.getElementById('res-msg').innerHTML = "Selamat atas kelulusan, <strong>" + nama + "</strong>! Kerja keras Anda membuahkan hasil. Teruslah terbang tinggi mengejar cita-cita.";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }); // Efek konfeti
            } else {
                badge.className = "status-badge status-gagal";
                document.getElementById('res-msg').innerHTML = "Mohon maaf, <strong>" + nama + "</strong>. Jangan berkecil hati. Kegagalan adalah awal dari perjalanan baru yang lebih kuat. Tetap semangat!";
            }
        }
